<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajeeb Saha Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Great+Vibes&family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #FFD700; --pink: #ff00ff; --dark-gold: #b8860b; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); z-index: -2; }
        .pink-glow { position: fixed; bottom: -50px; left: 0; width: 100%; height: 400px; background: radial-gradient(circle, rgba(255, 0, 255, 0.3) 0%, transparent 70%); filter: blur(80px); z-index: -1; pointer-events: none; }
        
        .page-border { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            border: 8px solid transparent; 
            border-image: linear-gradient(45deg, var(--gold), #fff, var(--dark-gold), #fff, var(--gold)) 1; 
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3);
            pointer-events: none; z-index: 1000; 
        }

        .container { padding: 60px 20px; max-width: 500px; margin: auto; text-align: center; }
        .profile-name { font-family: 'Cinzel Decorative', cursive; font-size: 55px; font-weight: 900; background: linear-gradient(to bottom, #fff 20%, var(--gold) 50%, var(--dark-gold) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 10px 20px rgba(255, 215, 0, 0.4); margin-bottom: 40px; letter-spacing: 2px; }

        /* বাটন অ্যানিমেশন: সাদা আর পিঙ্ক গ্লো */
        .btn-glow { 
            display: block; padding: 22px; margin: 25px 0; border-radius: 50px; 
            text-decoration: none; color: white; font-weight: 1000; font-size: 29px; 
            background: #000; border: 2px solid rgba(255,255,255,0.2); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; overflow: hidden; z-index: 1;
        }

        .btn-glow::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), var(--pink), transparent);
            transition: none;
            animation: waveFlow 3s infinite linear;
            z-index: -1;
        }

        @keyframes waveFlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-glow:hover { 
            transform: translateY(-15px) rotate(-3deg) scale(1.08); 
            box-shadow: 0 0 30px #fff, 0 0 50px var(--pink);
            border-color: var(--pink);
        }

        .social-btn { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 18px; margin: 15px 0; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); transition: 0.4s; }
        .social-btn:hover { transform: translateY(-10px) rotate(3deg) scale(1.1); box-shadow: 0 0 30px var(--pink); border-color: var(--pink); }

        .stay-text { margin: 60px 0; font-size: 55px; font-family: 'Great Vibes', cursive; text-shadow: 0 0 20px var(--pink); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% {transform: translateY(0) rotate(-2deg);} 50% {transform: translateY(-25px) rotate(2deg);} }

        .thank-you-bar { font-family: 'Montserrat', sans-serif; background: linear-gradient(45deg, #ff00ff, #00ffff); padding: 22px; border-radius: 50px; cursor: pointer; margin-top: 50px; font-weight: 800; font-size: 24px; border: none; width: 100%; color: white; }
        .thank-you-bar:hover { transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 60px var(--pink); }

        .puja-item { position: fixed; top: -100px; color: rgba(255, 255, 255, 0.7); font-size: 30px; pointer-events: none; z-index: 1; filter: blur(2px); animation: slowFall linear infinite; }
        @keyframes slowFall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="pink-glow"></div>
<div class="page-border"></div>

<div class="container">
    <div class="profile-name">Sajeeb Saha</div>
    <a href="https://www.facebook.com/SAJEEBSAHA.MS" class="btn-glow">SAJEEB SAHA</a>
    <h2 style="font-family: 'Cinzel'; color: #888; margin-top: 60px; font-size: 16px; letter-spacing: 5px;">Powered by Sajeeb Saha</h2>
    <a href="https://www.facebook.com/share/1HL2L5KQGk/" class="social-btn"><i class="fab fa-facebook"></i> Honey Entertainment Follow</a>
    <a href="https://www.tiktok.com/@honey_owner_sajeeb?is_from_webapp=1&sender_device=pc" class="social-btn"><i class="fab fa-tiktok"></i> Honey Entertainment Follow</a>
    <div class="stay-text">Stay with me</div>
    <button class="thank-you-bar" onclick="celebrate()">THANK YOU</button>
    <p style="margin-top:80px; opacity:0.3; font-size:10px;">© HONEY ENTERTAINMENT-Sajeeb saha</p>
</div>

<script>
    function celebrate() {
        var count = 500;
        var defaults = { origin: { y: 0.6 }, zIndex: 1100 };
        function fire(particleRatio, opts) {
            confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(count * particleRatio) }));
        }
        fire(0.25, { spread: 40, startVelocity: 70 });
        fire(0.2, { spread: 80 });
        fire(0.35, { spread: 140, decay: 0.91, scalar: 1.2 });
        fire(0.1, { spread: 150, startVelocity: 40, decay: 0.92, scalar: 1.5 });
        fire(0.1, { spread: 150, startVelocity: 60 });
    }

    function createPujaItem() {
        const item = document.createElement('div');
        item.classList.add('puja-item');
        const icons = ['🔱','🎯','Sajeeb']; 
        item.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        item.style.left = Math.random() * 100 + 'vw';
        item.style.animationDuration = Math.random() * 3 + 5 + 's';
        item.style.opacity = Math.random() * 0.5 + 0.3;
        item.style.fontSize = Math.random() * 20 + 20 + 'px';
        document.body.appendChild(item);
        setTimeout(() => item.remove(), 8000);
    }
    setInterval(createPujaItem, 500);
</script>

</body>

</html>
