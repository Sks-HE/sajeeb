<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sajeeb Saha Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Great+Vibes&family=Montserrat:wght@400;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --gold: #FFD700; 
            --pink: #ff00ff; 
            --dark-gold: #b8860b; 
            --premium-black: #050505;
            --pure-white: #ffffff;
            --soft-white: rgba(255, 255, 255, 0.9);
            --crystal: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            margin: 0; padding: 0; 
            background: var(--premium-black); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Hero Image - Zoom Animation with Endless Gradient Effect */
        .hero-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75vh; 
            z-index: -3;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            animation: zoomInOut 20s ease-in-out infinite;
        }

        @keyframes zoomInOut {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.2) 40%, 
                var(--premium-black) 95%
            );
        }

        /* Floating Particles / Background Glow */
        .animated-bg { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(26, 26, 46, 0.4) 0%, #000 100%); 
            z-index: -2; 
        }
        
        .white-glow { 
            position: fixed; 
            bottom: -50px; 
            left: 0; 
            width: 100%; 
            height: 400px; 
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%); 
            filter: blur(80px); 
            z-index: -1; 
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container { 
            padding: 100px 20px 60px; 
            max-width: 500px; 
            margin: auto; 
            text-align: center; 
            position: relative; 
            z-index: 10;
        }
        
        /* Entrance Animations */
        .fade-in {
            animation: fadeInTop 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes fadeInTop {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .profile-name { 
            font-family: 'Cinzel Decorative', cursive; 
            font-size: 38px; 
            font-weight: 900; 
            background: linear-gradient(to bottom, #ffffff 10%, #f7f7f7 30%, var(--gold) 60%, var(--dark-gold) 90%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 10px 35px rgba(255, 255, 255, 0.25); 
            margin-bottom: 20px; 
            letter-spacing: 2px;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Adjusted Content Group to move everything lower */
        .content-group {
            margin-top: 180px; 
            animation: fadeInTop 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s both;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .social-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 15px 10px; border-radius: 22px; 
            text-decoration: none; color: white; font-weight: bold; 
            background: rgba(255,255,255,0.07); 
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3); 
            transition: 0.4s; 
            width: 35%; 
            font-size: 13px;
            position: relative;
            overflow: hidden;
        }

        .he-website-section {
            margin-top: 35px;
            animation: fadeInTop 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s both;
        }

        .he-label {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--pure-white);
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .he-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 6px 16px; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            width: fit-content;
            margin: 0 auto;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: hePulse 3s ease-in-out infinite;
        }

        @keyframes hePulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 255, 255, 0.05); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); }
        }

        .he-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--pure-white);
            animation-play-state: paused;
        }

        .he-logo-wrapper {
            width: 42px; 
            height: 42px; 
            overflow: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--pure-white);
            background: #000;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .he-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transform: scale(1.4);
        }

        .he-text {
            font-family: 'Cinzel Decorative', cursive;
            font-weight: 900;
            font-size: 20px; 
            letter-spacing: 3px;
            color: var(--pure-white);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .social-btn:active, .he-btn:active {
            transform: scale(0.92);
        }

        .social-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); 
            border-color: #ffffff; 
            background: rgba(255, 255, 255, 0.15);
        }

        .thank-you-bar { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            background-size: 230% auto;
            animation: shine 3s linear infinite, fadeInTop 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s both;
            padding: 9px; border-radius: 99px; 
            cursor: pointer; margin: 90px auto 0; 
            font-weight: 800; font-size: 18px; 
            width: 60%;
            color: #222; 
            box-shadow: 0 8px 25px rgba(184, 134, 11, 0.4);
            transition: 0.4s;
            display: block;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .thank-you-bar:active { 
            transform: scale(0.95); 
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

<div id="particles"></div>

<div class="hero-image-container">
    <img src="https://i.pinimg.com/736x/4d/b4/c4/4db4c4778f38850b8a0740954155ddcf.jpg" alt="Sajeeb Saha Background">
    <div class="hero-overlay"></div>
</div>

<div class="animated-bg"></div>
<div class="white-glow"></div>

<div class="container fade-in">
    <a href="https://www.facebook.com/share/186na5ZYSo/" class="profile-link">
        <div class="profile-name">Sajeeb</div>
    </a>
    
    <div class="content-group">
        <h2 style="font-family: 'Cinzel Decorative'; color: var(--pure-white); margin-top: 0; font-size: 10px; letter-spacing: 5px; opacity: 0.9;">POWERED BY SAJEEB SAHA</h2>
        
        <div class="social-container">
            <a href="https://www.facebook.com/share/1CEQ2cphaT/" class="social-btn"><i class="fab fa-facebook"></i> HE Follow</a>
            <a href="https://www.tiktok.com/@honey_owner_sajeeb?_r=1&_t=ZS-94DkRWonkGX" class="social-btn"><i class="fab fa-tiktok"></i> HE Follow</a>
        </div>

        <div class="he-website-section">
            <div class="he-label">Visit HE's Website Now</div>
            <a href="https://sks-he.github.io/Honey-Entertainment/" class="he-btn" target="_blank">
                <div class="he-logo-wrapper">
                    <img src="https://i.pinimg.com/736x/96/5f/f8/965ff82713b7a1ef6e3ffb782fcdc412.jpg" alt="HE Logo" class="he-logo">
                </div>
                <span class="he-text">HE</span>
            </a>
        </div>
    </div>
    
    <button class="thank-you-bar" onclick="celebrate()">THANK YOU</button>
    
    <p style="margin-top:80px; opacity:0.6; font-size:11px; letter-spacing: 2px; color: #fff; animation: fadeInTop 1.5s ease 0.9s both;">© Sajeeb-HE</p>
</div>

<script>
    function celebrate() {
        // Check if confetti is loaded
        if (typeof confetti !== 'function') {
            console.error('Confetti library not loaded yet');
            return;
        }

        var count = 250;
        var defaults = { 
            origin: { y: 1.0 }, 
            zIndex: 1100 
        };

        function fire(particleRatio, opts) {
            confetti(Object.assign({}, defaults, opts, { 
                particleCount: Math.floor(count * particleRatio),
                colors: ['#ffffff', '#FFD700', '#DAA520', '#B8860B', '#ff00ff'], 
                spread: 70, 
                startVelocity: 65, 
                gravity: 0.8, 
                scalar: 1.2 
            }));
        }

        fire(0.25, { spread: 60, angle: 60 });
        fire(0.25, { spread: 60, angle: 120 });
        fire(0.3, { spread: 100, angle: 90 });
        fire(0.2, { spread: 120, angle: 90, startVelocity: 45 });
    }

    const particleContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.style.position = 'absolute';
        p.style.width = Math.random() * 3 + 'px';
        p.style.height = p.style.width;
        p.style.background = 'white';
        p.style.borderRadius = '50%';
        p.style.opacity = Math.random() * 0.5;
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        
        const duration = 10 + Math.random() * 20;
        p.animate([
            { transform: 'translateY(0) translateX(0)', opacity: 0 },
            { transform: `translateY(-${100 + Math.random() * 200}px) translateX(${(Math.random() - 0.5) * 50}px)`, opacity: 0.5 },
            { transform: `translateY(-${300 + Math.random() * 400}px) translateX(${(Math.random() - 0.5) * 100}px)`, opacity: 0 }
        ], {
            duration: duration * 1000,
            iterations: Infinity,
            easing: 'linear'
        });
        particleContainer.appendChild(p);
    }
</script>

</body>
</html>
